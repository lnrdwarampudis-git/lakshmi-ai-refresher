        track: "mixed", pill: "pill-mixed",
        theory: ["MLflow experiment tracking", "Log params, metrics, models", "Compare runs visually", "Register model for serving"],
        exercise: `import mlflow\nimport mlflow.sklearn\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import accuracy_score\n\nwith mlflow.start_run():\n    model = LogisticRegression(C=1.0)\n    model.fit(X_train, y_train)\n    acc = accuracy_score(y_test,\n                         model.predict(X_test))\n    mlflow.log_param("C", 1.0)\n    mlflow.log_metric("accuracy", acc)\n    mlflow.sklearn.log_model(model, "model")\nprint(f"Logged accuracy: {acc:.4f}")`
      }
    ],
    weekend: {
      title: "Weekend capstone — full ML pipeline on Databricks",
      tasks: ["Load a Delta table, engineer features using PySpark", "Run PCA to reduce dimensions, analyze with correlation matrix", "Train logistic regression AND a 2-layer neural net (PyTorch)", "Log both experiments in MLflow, compare metrics", "Register the best model in Databricks Model Registry — production ready!"]
    }
  }
];

let active = 0;

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = weeks.map((w, i) =>
    `<div class="tab ${i===active?'active':''}" onclick="setWeek(${i})">${w.label}</div>`
  ).join('');
}

function renderContent() {
  const w = weeks[active];
  const el = document.getElementById('content');
  let html = '';
  w.days.forEach(d => {
    html += `<div class="day-card">
      <div class="day-header">
        <span class="day-label">${d.day}</span>
        <span class="day-title">${d.title}</span>
        <span class="track-pill ${d.pill}">${d.track}</span>
      </div>
      <div class="day-body">
        <div>
          <div class="block-label">2 hr theory</div>
          <div class="block-content"><ul style="margin:0;padding-left:16px">${d.theory.map(t=>`<li>${t}</li>`).join('')}</ul></div>
        </div>
        <div>
          <div class="block-label">1 hr coding</div>
          <div class="code-block">${d.exercise.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>
      </div>
    </div>`;
  });
  html += `<div class="weekend-card">
    <div class="weekend-title">Weekend project — ${w.weekend.title.split('—')[1]?.trim() || w.weekend.title}</div>
    <div>${w.weekend.tasks.map(t=>`<span class="project-tag">${t}</span>`).join('')}</div>
  </div>`;
  el.innerHTML = html;
}

function setWeek(i) { active = i; renderTabs(); renderContent(); }

renderTabs();
renderContent();
</script>
