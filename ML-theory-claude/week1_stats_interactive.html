
<style>
* { box-sizing: border-box; }
.section { margin-bottom: 2rem; }
.section-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 12px; }
.stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--color-background-secondary); border-radius: 8px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px; }
.ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
.data-points { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.dp { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--color-text-primary); background: var(--color-background-secondary); transition: all 0.15s; }
.dp.outlier { background: var(--color-background-danger); color: var(--color-text-danger); border-color: var(--color-border-danger); }
.dp.mean-pt { background: var(--color-background-success); color: var(--color-text-success); border-color: var(--color-border-success); }
.insight { font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: 8px; padding: 10px 14px; border-left: 3px solid var(--color-border-info); border-radius: 0 8px 8px 0; margin-top: 10px; }
.insight b { color: var(--color-text-primary); font-weight: 500; }
.add-btn { font-size: 13px; padding: 6px 14px; }
</style>

<div class="section">
  <div class="section-title">Mean, variance and standard deviation — interactive explorer</div>
  <div class="controls">
    <div class="ctrl-group">Dataset:
      <select id="preset" style="font-size:13px">
        <option value="normal">Balanced salaries</option>
        <option value="skewed">Skewed with outlier</option>
        <option value="spread">High spread</option>
        <option value="tight">Low spread</option>
      </select>
    </div>
    <button class="add-btn" onclick="addRandom()">+ Add random point</button>
    <button class="add-btn" onclick="addOutlier()">+ Add outlier</button>
    <button class="add-btn" onclick="resetData()">Reset</button>
  </div>
  <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px;">Click any value to remove it</div>
  <div class="data-points" id="dp-container"></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Mean</div><div class="stat-value" id="s-mean">—</div><div class="stat-sub">average value</div></div>
    <div class="stat-card"><div class="stat-label">Median</div><div class="stat-value" id="s-median">—</div><div class="stat-sub">middle value</div></div>
    <div class="stat-card"><div class="stat-label">Std dev</div><div class="stat-value" id="s-std">—</div><div class="stat-sub">avg spread</div></div>
    <div class="stat-card"><div class="stat-label">Variance</div><div class="stat-value" id="s-var">—</div><div class="stat-sub">std dev²</div></div>
  </div>
  <div style="position:relative;width:100%;height:160px;margin-bottom:8px;">
    <canvas id="distChart" role="img" aria-label="Distribution chart of data points showing mean and spread"></canvas>
  </div>
  <div class="insight" id="insight-text">Load a dataset to see insights.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const presets = {
  normal:  [42,45,47,48,50,50,51,52,53,55,57,60],
  skewed:  [30,32,35,36,38,40,42,45,50,95],
  spread:  [10,20,35,50,65,80,90,100,120,140],
  tight:   [48,49,49,50,50,50,51,51,52,53]
};

let data = [...presets.normal];
let chart = null;

function mean(d) { return d.reduce((a,b)=>a+b,0)/d.length; }
function median(d) { const s=[...d].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
function variance(d) { const m=mean(d); return d.reduce((a,b)=>a+(b-m)**2,0)/d.length; }
function std(d) { return Math.sqrt(variance(d)); }

function update() {
  if(data.length===0) return;
  const m=mean(data), med=median(data), s=std(data), v=variance(data);
  document.getElementById('s-mean').textContent = m.toFixed(1);
  document.getElementById('s-median').textContent = med.toFixed(1);
  document.getElementById('s-std').textContent = s.toFixed(1);
  document.getElementById('s-var').textContent = v.toFixed(1);

  const cont = document.getElementById('dp-container');
  const sorted = [...data].sort((a,b)=>a-b);
  cont.innerHTML = sorted.map((v,i)=>{
    const isMean = Math.abs(v-m)<0.5;
    const isOut = Math.abs(v-m)>2*s;
    return `<div class="dp ${isOut?'outlier':isMean?'mean-pt':''}" onclick="removeVal(${v})" title="Click to remove">${v}</div>`;
  }).join('');

  const diff = Math.abs(m - med);
  const insightText = diff > 3
    ? `<b>Mean (${m.toFixed(1)}) vs Median (${med.toFixed(1)})</b> — they differ by ${diff.toFixed(1)}. This signals <b>skew</b>. In ML, skewed features can distort model training — you'd apply log transform or normalization. In PySpark: <code>F.log1p("col")</code>`
    : `<b>Mean ≈ Median</b> — your data is roughly symmetric. Std dev = ${s.toFixed(1)} means most values lie between <b>${(m-s).toFixed(1)}</b> and <b>${(m+s).toFixed(1)}</b>. In ML, std dev is used in <b>z-score normalization</b>: (x - mean) / std.`;
  document.getElementById('insight-text').innerHTML = insightText;

  const bins = 10;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const binSize = range / bins;
  const labels = Array.from({length:bins},(_,i)=>(min+i*binSize).toFixed(0));
  const counts = new Array(bins).fill(0);
  data.forEach(x=>{ const b=Math.min(Math.floor((x-min)/binSize),bins-1); counts[b]++; });

  const meanBin = Math.min(Math.floor((m-min)/binSize), bins-1);
  const colors = counts.map((_,i)=> i===meanBin ? '#1D9E75' : '#378ADD');

  if(chart) { chart.destroy(); }
  chart = new Chart(document.getElementById('distChart'), {
    type:'bar',
    data:{ labels, datasets:[{ data:counts, backgroundColor:colors, borderWidth:0, borderRadius:4 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ title: (i)=>`Value ≈ ${i[0].label}`, label: (i)=>`Count: ${i.raw}` }}},
      scales:{
        x:{ ticks:{font:{size:11}, color:'#888'}, grid:{display:false} },
        y:{ ticks:{font:{size:11}, color:'#888', stepSize:1}, grid:{color:'rgba(128,128,128,0.1)'} }
      }
    }
  });
}

function addRandom() {
  const m = mean(data), s = std(data)||10;
  data.push(Math.round(m + (Math.random()-0.5)*s*2));
  update();
}
function addOutlier() {
  const m = mean(data), s = std(data)||10;
  data.push(Math.round(m + s * (Math.random()>0.5?3.5:-3.5)));
  update();
}
function removeVal(v) {
  const i = data.indexOf(v);
  if(i>-1) data.splice(i,1);
  update();
}
function resetData() {
  data = [...presets[document.getElementById('preset').value]];
  update();
}
document.getElementById('preset').onchange = resetData;
update();
</script>
