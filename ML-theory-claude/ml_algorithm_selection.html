const charts={};
function mkChart(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),cfg);}

function showP(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
  builders[id]();
}

const builders={

framework:()=>{
  document.getElementById('panel-framework').innerHTML=`
<div class="h1">ML Algorithm Selection Framework</div>
<div class="h1-sub">9 questions to ask before choosing any algorithm — in this exact order</div>

<div class="insight"><b>The golden rule:</b> Always start with the simplest algorithm that could possibly work. Complexity is a cost — it makes models harder to debug, explain, maintain, and deploy. Only add complexity when simpler approaches provably fail.</div>

<div class="three-col">
  <div class="card-b">
    <div class="ct ct-b">Step 1 — Problem type</div>
    <div class="cb">
      What are you predicting?<br><br>
      <b>Supervised:</b> labelled data exists<br>
      · Regression → continuous output<br>
      · Classification → category output<br><br>
      <b>Unsupervised:</b> no labels<br>
      · Clustering → group discovery<br>
      · Dimensionality reduction<br><br>
      <b>Reinforcement:</b> agent + reward<br>
      <span class="tag tag-b">Determines algorithm family</span>
    </div>
  </div>
  <div class="card-w">
    <div class="ct ct-w">Step 2 — Data size</div>
    <div class="cb">
      How many rows and features?<br><br>
      <b>&lt; 10k rows:</b> any algorithm works<br>
      <b>10k–1M rows:</b> tree-based models shine<br>
      <b>&gt; 1M rows:</b> linear models or distributed training (Spark ML)<br>
      <b>&gt; 100M rows:</b> Spark MLlib only<br><br>
      <b>Features:</b><br>
      · &lt;100: any algorithm<br>
      · 100–10k: tree-based + regularization<br>
      · &gt;10k: linear + PCA first<br>
      <span class="tag tag-y">Eliminates impractical choices</span>
    </div>
  </div>
  <div class="card-g">
    <div class="ct ct-g">Step 3 — Interpretability need</div>
    <div class="cb">
      Can you use a black box?<br><br>
      <b>High interpretability needed:</b><br>
      · Healthcare, finance, legal<br>
      → Linear/logistic regression<br>
      → Decision trees<br><br>
      <b>Interpretability optional:</b><br>
      · Recommendation, search, ranking<br>
      → Neural nets, XGBoost, ensemble<br><br>
      <span class="tag tag-g">Regulatory constraint</span>
    </div>
  </div>
</div>

<div class="three-col">
  <div class="card">
    <div class="ct">Step 4 — Training time budget</div>
    <div class="cb">
      How long can training take?<br><br>
      <b>Minutes:</b> linear models, naive Bayes, decision trees<br>
      <b>Hours:</b> Random Forest, XGBoost, SVM<br>
      <b>Days:</b> deep neural networks<br>
      <b>Weeks:</b> LLM pre-training<br><br>
      <span class="tag tag-b">Sets compute budget</span>
    </div>
  </div>
  <div class="card">
    <div class="ct">Step 5 — Inference speed</div>
    <div class="cb">
      How fast must predictions be?<br><br>
      <b>&lt;1ms (real-time):</b> linear models, shallow trees<br>
      <b>1–10ms (near-real-time):</b> XGBoost, small neural nets<br>
      <b>&gt;100ms acceptable:</b> large ensembles, deep nets<br><br>
      <span class="tag tag-b">Production constraint</span>
    </div>
  </div>
  <div class="card">
    <div class="ct">Step 6 — Data characteristics</div>
    <div class="cb">
      What does your data look like?<br><br>
      · Tabular → tree-based models win<br>
      · Text → transformers, TF-IDF + LR<br>
      · Images → CNNs<br>
      · Time series → LSTM, Prophet<br>
      · Graph data → GNNs<br>
      · Mixed types → XGBoost<br><br>
      <span class="tag tag-b">Data type is decisive</span>
    </div>
  </div>
</div>

<div class="three-col">
  <div class="card">
    <div class="ct">Step 7 — Label availability</div>
    <div class="cb">
      How much labelled data?<br><br>
      <b>Lots of labels:</b> supervised learning<br>
      <b>Few labels:</b> semi-supervised, transfer learning, few-shot<br>
      <b>No labels:</b> unsupervised (clustering, anomaly detection)<br>
      <b>Expensive to label:</b> active learning<br><br>
      <span class="tag tag-b">Determines learning paradigm</span>
    </div>
  </div>
  <div class="card">
    <div class="ct">Step 8 — Class balance</div>
    <div class="cb">
      Is the target balanced?<br><br>
      <b>Balanced:</b> any algorithm, accuracy metric<br>
      <b>Imbalanced (e.g. 1% fraud):</b> use class weights, SMOTE, F1/AUC not accuracy<br>
      <b>Extreme imbalance:</b> anomaly detection instead of classification<br><br>
      <span class="tag tag-b">Metric + algorithm choice</span>
    </div>
  </div>
  <div class="card">
    <div class="ct">Step 9 — Baseline first</div>
    <div class="cb">
      What is the simplest possible model?<br><br>
      Always implement:<br>
      · Predict mean (regression baseline)<br>
      · Predict majority class (classification)<br>
      · Simple linear/logistic regression<br><br>
      If your complex model doesn't beat these, something is wrong upstream (data, features).<br><br>
      <span class="tag tag-g">Always do this first</span>
    </div>
  </div>
</div>

<div class="divider"></div>
<div class="h1" style="font-size:14px;margin-bottom:10px;">Algorithm map by problem type</div>
<table class="tbl">
  <tr><th>Problem type</th><th>Start here</th><th>If underfitting</th><th>If overfitting</th><th>Production sweet spot</th></tr>
  <tr><td><b>Regression</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">continuous output</span></td><td>Linear Regression</td><td>Random Forest Regressor</td><td>Add L2 regularization</td><td>XGBoost / LightGBM</td></tr>
  <tr><td><b>Binary classification</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">yes/no output</span></td><td>Logistic Regression</td><td>Gradient Boosted Trees</td><td>Regularization + dropout</td><td>XGBoost / LightGBM</td></tr>
  <tr><td><b>Multi-class</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">3+ categories</span></td><td>Logistic Regression (OvR)</td><td>Random Forest</td><td>Add regularization</td><td>XGBoost / Neural Net</td></tr>
  <tr><td><b>Clustering</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">no labels</span></td><td>K-Means</td><td>DBSCAN / GMM</td><td>N/A</td><td>K-Means + PCA first</td></tr>
  <tr><td><b>Anomaly detection</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">find outliers</span></td><td>Isolation Forest</td><td>Autoencoder</td><td>N/A</td><td>Isolation Forest</td></tr>
  <tr><td><b>Text classification</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">NLP</span></td><td>TF-IDF + Logistic Reg</td><td>BERT fine-tuning</td><td>More data / dropout</td><td>Fine-tuned LLM</td></tr>
  <tr><td><b>Time series</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">sequential data</span></td><td>Linear + lag features</td><td>XGBoost + lag features</td><td>Add regularization</td><td>XGBoost or Prophet</td></tr>
  <tr><td><b>Recommendation</b><br><span style="font-size:10px;color:var(--color-text-tertiary)">user-item</span></td><td>ALS (matrix factorization)</td><td>Neural collaborative filtering</td><td>Regularization</td><td>ALS / Two-tower model</td></tr>
</table>`;
},

      spark:'Use sklearn IsolationForest on Databricks, or Extended Isolation Forest',tags:['No labels','Fraud detection','Outlier scores']
    }
  };

  let path=[];
  let currentQ='q1';

  function getQuestion(id){return questions.find(q=>q.id===id);}

  function nextQId(val){
    const map={
      regression:'q2_reg', classification:'q2_cls',
      clustering:null, anomaly:null,
      reg_small:'q3_reg_sm', reg_medium:'q3_reg_md', reg_large:null,
      cls_small:'q3_cls_sm', cls_medium:'q3_cls_md', cls_large:null,
      reg_sm_interp:null,reg_sm_acc:null,reg_md_tab:null,reg_md_unstr:null,
      cls_sm_imbal:null,cls_sm_bal:null,cls_md_interp:null,cls_md_acc:null
    };
    return map[val];
  }

  function render(){
    const el=document.getElementById('panel-wizard');
    let html=`<div class="h1">Algorithm Wizard</div><div class="h1-sub">Answer these questions to get a personalised algorithm recommendation</div>`;
    if(path.length>0){
      html+=`<div class="dt-breadcrumb">Your answers: `+path.map(p=>p.label).join(' → ')+`</div>`;
    }
    const lastVal=path.length>0?path[path.length-1].val:null;
    if(lastVal && results[lastVal]){
      const r=results[lastVal];
      html+=`<div class="dt-result">
        <div class="dt-result-title">Recommended: ${r.title}</div>
        <div class="dt-result-body">
          <b>Why this algorithm:</b> ${r.why}<br><br>
          <b>Pros:</b> ${r.pros}<br>
          <b>Cons:</b> ${r.cons}<br><br>
          <b>Next step if not good enough:</b> ${r.next}<br><br>
          <b>Databricks code:</b> <code style="font-family:var(--font-mono);font-size:11px;">${r.spark}</code><br><br>
          ${r.tags.map(t=>`<span class="tag tag-g">${t}</span>`).join('')}
        </div>
      </div>
      <button onclick="resetWizard()" style="font-size:12px;padding:6px 16px;margin-bottom:12px;">Start over</button>`;
    } else {
      if(currentQ){
        const q=getQuestion(currentQ);
        if(q){
          html+=`<div class="dt-q">${q.text}</div><div class="dt-opts">`;
          q.opts.forEach(opt=>{
            html+=`<div class="dt-opt" onclick="selectOpt('${opt.val}','${opt.label.replace(/'/g,"\\'")}')">${opt.label}</div>`;
          });
          html+=`</div>`;
        }
      }
      if(path.length>0) html+=`<button onclick="goBack()" style="font-size:12px;padding:5px 14px;">← Back</button>`;
    }
    el.innerHTML=html;
  }

  window.selectOpt=function(val,label){
    path.push({val,label});
    const next=nextQId(val);
    if(next){currentQ=next;}
    render();
  };
  window.goBack=function(){
    if(path.length>0){
      const prev=path.pop();
      currentQ=path.length>0?nextQId(path[path.length-1].val)||'q1':'q1';
      if(!nextQId(prev.val)) currentQ=path.length>0?getParentQ(path[path.length-1].val):'q1';
    }
    render();
  };
  window.resetWizard=function(){path=[];currentQ='q1';render();};
  function getParentQ(val){
    const map={regression:'q1',classification:'q1',reg_small:'q2_reg',reg_medium:'q2_reg',cls_small:'q2_cls',cls_medium:'q2_cls',reg_sm_interp:'q3_reg_sm',reg_sm_acc:'q3_reg_sm',reg_md_tab:'q3_reg_md'};
    return map[val]||'q1';
  }
  render();
},

df.select([F.mean(c).alias(c) for c in num_cols]).show()   # check distributions
df.groupBy("label").count().show()                          # check balance

# ── Step 2: Prepare features ───────────────────────────────────
train, val, test = df.randomSplit([0.7, 0.15, 0.15], seed=42)
assembler = VectorAssembler(inputCols=feature_cols, outputCol="features")
scaler    = StandardScaler(inputCol="features", outputCol="scaled",

pipeline_stages = [assembler, scaler]

evaluator = RegressionEvaluator(metricName="rmse")

# ── Step 3: Baseline — predict mean ───────────────────────────
mean_pred = train.agg(F.mean("label")).first()[0]
baseline_rmse = val.withColumn("prediction", F.lit(mean_pred))
print("Baseline RMSE:", evaluator.evaluate(baseline_rmse))

# ── Step 4: Escalate complexity ────────────────────────────────
models = {
    "linear":  LinearRegression(regParam=0.1),
    "rf":      RandomForestRegressor(numTrees=100, maxDepth=6),
    "gbt":     GBTRegressor(maxIter=100, maxDepth=6, stepSize=0.1)
}

results = {}

        preds     = fitted.transform(val)
        rmse      = evaluator.evaluate(preds)
        mlflow.log_metric("val_rmse", rmse)
        results[name] = rmse
        print(f"{name}: RMSE = {rmse:.4f}")

# ── Step 5: Pick best, register ───────────────────────────────
best_model_name = min(results, key=results.get)
print(f"Best model: {best_model_name} (RMSE={results[best_model_name]:.4f})")

    <div class="algo-title">${d.name} <span class="tag tag-b">${d.type}</span></div>

    </div>
    <div style="font-size:11px;font-weight:500;color:var(--color-text-warning);margin-bottom:3px;">WHEN TO USE</div>
    <div class="algo-body">${d.when}</div>
  </div>`;
  const labels=['Accuracy','Training speed','Interpretability','Scalability','Outlier robust','Ease of use'];
  const vals=Object.values(d.scores);
  mkChart('algo-radar',{type:'radar',data:{labels,datasets:[{data:vals,borderColor:'#378ADD',borderWidth:2,backgroundColor:'rgba(55,138,221,0.15)',pointBackgroundColor:'#378ADD',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'rgba(128,128,128,0.15)'},pointLabels:{font:{size:11},color:'var(--color-text-secondary)'}}}}});
  document.getElementById('algo-insight').innerHTML=`<b>${d.name}</b> scores: Accuracy <b>${d.scores.accuracy}/100</b>, Speed <b>${d.scores.speed}/100</b>, Interpretability <b>${d.scores.interpretability}/100</b>, Scalability <b>${d.scores.scalability}/100</b>. ${d.scores.accuracy>85?'High accuracy but may sacrifice interpretability or speed.':d.scores.interpretability>90?'Highly interpretable — great for regulated industries.':d.scores.scalability<40?'Does not scale — avoid for large Databricks datasets.':'Balanced tradeoffs — good general-purpose choice.'}`;
};

function buildFactorChart(){
  const algos=['Linear/Logistic','Decision Tree','Random Forest','XGBoost','Neural Net','K-Means'];
  const accuracy=[50,60,80,95,90,60];
  const speed=[100,90,65,60,30,85];

  mkChart('factor-chart',{type:'bar',data:{labels:algos,datasets:[
    {label:'Accuracy',data:accuracy,backgroundColor:'rgba(29,158,117,0.7)',borderRadius:3,borderWidth:0},
    {label:'Speed',data:speed,backgroundColor:'rgba(55,138,221,0.7)',borderRadius:3,borderWidth:0},
    {label:'Interpretability',data:interpret,backgroundColor:'rgba(186,117,23,0.7)',borderRadius:3,borderWidth:0},
    {label:'Scalability',data:scale,backgroundColor:'rgba(127,119,221,0.7)',borderRadius:3,borderWidth:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:'#888'},grid:{display:false}},y:{min:0,max:100,ticks:{font:{size:11},color:'#888'},grid:{color:'rgba(128,128,128,0.08)'}}}}});
}
